<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0a0a0a;--card:#1a1a1a;--card2:#111;--border:#333;--text:#e0e0e0;--text-dim:#888;
--accent:#FFE81F;--gold:#c8a415;--danger:#ff4444;--success:#44ff44;--info:#4488ff;
--nav-height:64px;--radius:12px;
}
html,body{
height:100%;width:100%;overflow:hidden;
background:var(--bg);color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
font-size:15px;line-height:1.5;
touch-action:manipulation;
-webkit-tap-highlight-color:transparent;
overscroll-behavior:none;
}
body{display:flex;flex-direction:column}
h1,h2,h3,.mono{font-family:'Courier New',monospace}
.app-header{
background:var(--card);border-bottom:1px solid var(--border);
padding:12px 16px;text-align:center;flex-shrink:0;
}
.app-header h1{font-size:18px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.tab-content-area{
flex:1;overflow-y:auto;overflow-x:hidden;
-webkit-overflow-scrolling:touch;
padding:12px 12px calc(var(--nav-height) + 16px) 12px;
}
.tab-panel{display:none}
.tab-panel.active{display:block}
.bottom-nav{
position:fixed;bottom:0;left:0;right:0;
height:var(--nav-height);
background:var(--card);border-top:2px solid var(--border);
display:flex;align-items:center;justify-content:space-around;
z-index:1000;padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-btn{
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:8px 12px;border:none;background:none;color:var(--text-dim);
font-size:11px;gap:4px;min-width:60px;min-height:44px;
cursor:pointer;transition:color .2s;border-radius:8px;
}
.nav-btn i{font-size:20px}
.nav-btn.active{color:var(--accent)}
.nav-btn:active{background:rgba(255,232,31,.1)}
.card{
background:var(--card);border:1px solid var(--border);
border-radius:var(--radius);margin-bottom:12px;overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.card-header{
display:flex;align-items:center;justify-content:space-between;
padding:14px 16px;cursor:pointer;min-height:48px;
background:rgba(255,232,31,.03);
}
.card-header h3{font-size:14px;color:var(--accent);text-transform:uppercase;letter-spacing:1px}
.card-header .chevron{color:var(--text-dim);transition:transform .3s}
.card-header.collapsed .chevron{transform:rotate(-90deg)}
.card-body{padding:12px 16px 16px}
.card-body.collapsed{display:none}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.form-group{flex:1;min-width:0}
.form-group label{display:block;font-size:11px;color:var(--text-dim);text-transform:uppercase;margin-bottom:4px;letter-spacing:.5px}
.form-group input,.form-group select{
width:100%;padding:10px 12px;background:var(--card2);border:1px solid var(--border);
border-radius:8px;color:var(--text);font-size:14px;min-height:44px;
}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.form-group input[type="number"]{-moz-appearance:textfield;text-align:center}
.form-group input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
.computed-field{font-weight:700;color:var(--accent);background:#222 !important}
.gold-field{font-weight:700;color:var(--gold);background:#1a1500 !important;border-color:var(--gold) !important}
.btn{
display:inline-flex;align-items:center;justify-content:center;gap:8px;
padding:12px 20px;border:none;border-radius:8px;font-size:14px;
font-weight:600;cursor:pointer;min-height:44px;min-width:44px;
transition:all .15s;
}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:active{background:var(--gold);transform:scale(.96)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:active{transform:scale(.96)}
.btn-secondary{background:#333;color:var(--text)}
.btn-secondary:active{background:#444;transform:scale(.96)}
.btn-small{padding:8px 12px;font-size:12px;min-height:36px}
.btn-block{width:100%;display:flex}
.ability-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ability-card{
background:var(--card2);border:1px solid var(--border);border-radius:8px;
padding:10px;text-align:center;
}
.ability-card .ab-label{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:1px}
.ability-card .ab-mod{font-size:20px;color:var(--accent);font-weight:700}
.ability-card input{width:60px;text-align:center;margin:4px auto;display:block}
.ability-card .ab-racial{font-size:10px;color:var(--gold);margin-top:2px}
.skill-row{
display:flex;align-items:center;gap:6px;padding:8px 0;
border-bottom:1px solid rgba(255,255,255,.05);min-height:44px;
}
.skill-name{flex:1;font-size:13px;cursor:pointer;color:var(--text)}
.skill-name:active{color:var(--accent)}
.skill-ability{font-size:11px;color:var(--text-dim);width:30px;text-align:center}
.skill-input{
width:36px;padding:6px 4px;text-align:center;
background:var(--card2);border:1px solid var(--border);border-radius:4px;
color:var(--text);font-size:13px;min-height:36px;
}
.skill-total{width:30px;text-align:center;font-weight:700;color:var(--accent);font-size:14px}
.skill-class-highlight{background:rgba(255,232,31,.05);border-radius:4px;padding:2px 4px}
.skill-desc-panel{
display:none;background:var(--card2);border:1px solid var(--border);
border-radius:8px;padding:12px;margin:4px 0 8px;font-size:12px;line-height:1.6;
}
.skill-desc-panel.open{display:block}
.skill-desc-panel h4{color:var(--accent);font-size:12px;margin-bottom:4px}
.skill-desc-panel p{margin-bottom:6px;color:var(--text-dim)}
.skill-desc-panel .desc-label{color:var(--gold);font-weight:600;font-size:11px;text-transform:uppercase}
.circle-pip{
width:24px;height:24px;border:2px solid var(--info);
border-radius:50%;cursor:pointer;transition:.15s;display:inline-block;margin:2px;
}
.circle-pip.filled{background:var(--info);box-shadow:0 0 6px var(--info)}
.circle-pip.dark{border-color:var(--danger)}
.circle-pip.dark.filled{background:var(--danger);box-shadow:0 0 6px var(--danger)}
.hp-bar{height:8px;background:#333;border-radius:4px;overflow:hidden;margin:4px 0}
.hp-bar-fill{height:100%;transition:width .3s;border-radius:4px}
.hp-bar-fill.vp{background:var(--success)}
.hp-bar-fill.wp{background:var(--danger)}
.weapon-card,.equip-row{
background:var(--card2);border:1px solid var(--border);border-radius:8px;
padding:10px;margin-bottom:8px;
}
.combatant-row{
background:var(--card2);border:1px solid var(--border);border-radius:8px;
padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px;
}
.combatant-row.active-turn{border-color:var(--accent);background:#1a1a00}
.comb-name{flex:1;font-weight:600}
.comb-hp{font-family:monospace;font-size:14px;color:var(--success);min-width:50px;text-align:center}
.dice-area{text-align:center;padding:20px 0}
.d20-btn{
width:80px;height:80px;border-radius:50%;background:var(--accent);color:#000;
font-size:24px;font-weight:700;border:none;cursor:pointer;
box-shadow:0 4px 16px rgba(255,232,31,.3);margin:0 auto 16px;display:block;
}
.d20-btn:active{transform:scale(.92)}
.dice-grid{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.dice-grid .btn{min-width:56px}
.dice-result{font-size:48px;color:var(--accent);font-family:monospace;font-weight:700;margin:8px 0}
.dice-detail{font-size:14px;color:var(--text-dim);margin-bottom:16px}
.roll-log{max-height:200px;overflow-y:auto;text-align:left}
.roll-entry{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.accordion-item{margin-bottom:8px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.accordion-header{
display:flex;align-items:center;justify-content:space-between;
padding:12px 16px;background:var(--card);cursor:pointer;min-height:44px;
}
.accordion-header h3{font-size:13px;color:var(--accent);letter-spacing:1px}
.accordion-header i{color:var(--text-dim);transition:transform .3s}
.accordion-header.open i{transform:rotate(180deg)}
.accordion-body{display:none;padding:12px 16px;background:var(--card2);font-size:13px;line-height:1.6}
.accordion-body.open{display:block}
.rules-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.rules-table th{text-align:left;color:var(--accent);padding:6px 8px;border-bottom:1px solid var(--border);font-size:11px}
.rules-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.traits-panel{background:var(--card2);border:1px solid var(--gold);border-radius:8px;padding:12px;margin-top:8px}
.traits-panel h4{color:var(--gold);font-size:12px;margin-bottom:6px}
.traits-panel .trait-name{color:var(--accent);font-weight:600;font-size:12px}
.traits-panel .trait-desc{color:var(--text-dim);font-size:12px;margin-bottom:6px}
.class-abilities-panel{background:var(--card2);border:1px solid var(--info);border-radius:8px;padding:12px;margin-top:8px}
.class-abilities-panel h4{color:var(--info);font-size:12px;margin-bottom:6px}
.search-input{
width:100%;padding:10px 12px;background:var(--card2);border:1px solid var(--border);
border-radius:8px;color:var(--text);font-size:14px;margin-bottom:12px;
}
.search-input:focus{outline:none;border-color:var(--accent)}
.feat-item{
padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;
}
.feat-item:active{background:rgba(255,232,31,.05)}
.feat-item .feat-name{font-weight:600;font-size:14px}
.feat-item .feat-type{font-size:11px;color:var(--gold)}
.feat-item .feat-prereq{font-size:11px;color:var(--text-dim)}
.feat-desc-panel{
display:none;padding:10px 12px;background:var(--card2);
border:1px solid var(--border);border-radius:6px;margin:4px 12px 8px;
font-size:12px;line-height:1.6;
}
.feat-desc-panel.open{display:block}
.feat-desc-panel .desc-label{color:var(--gold);font-weight:600;font-size:11px;text-transform:uppercase}
.feat-desc-panel p{margin-bottom:6px;color:var(--text-dim)}
</style>
</head>
<body>

<header class="app-header">
<h1><i class="fas fa-jedi"></i> Star Wars RPG</h1>
</header>

<div class="tab-content-area" id="tabContentArea">
<!-- CHARACTER TAB -->
<div class="tab-panel active" id="tab-character">

<div class="card" id="card-info">
<div class="card-header" data-toggle="card-info"><h3><i class="fas fa-id-card"></i> Character Info</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body">
<div class="form-row">
<div class="form-group" style="flex:2"><label>Name</label><input type="text" id="char-name" placeholder="Character Name"></div>
<div class="form-group"><label>Level</label><input type="number" id="char-level" min="1" max="20" value="1"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Species</label><select id="char-species"><option value="">-- Select --</option></select></div>
<div class="form-group"><label>Class</label><select id="char-class"><option value="">-- Select --</option></select></div>
</div>
<div class="form-row">
<div class="form-group"><label>Speed</label><input type="text" id="char-speed" value="10m" class="gold-field" readonly=""></div>
<div class="form-group"><label>Size Mod</label><input type="number" id="char-size" value="0" class="gold-field" readonly=""></div>
<div class="form-group"><label>XP</label><input type="number" id="char-xp" value="0"></div>
</div>
<div id="speciesTraitsPanel"></div>
<div id="classAbilitiesPanel"></div>
</div>
</div>

<div class="card" id="card-abilities">
<div class="card-header" data-toggle="card-abilities"><h3><i class="fas fa-fist-raised"></i> Abilities</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body">
<div class="ability-grid" id="abilityGrid"></div>
</div>
</div>

<div class="card" id="card-health">
<div class="card-header" data-toggle="card-health"><h3><i class="fas fa-heart"></i> Vitality / Wounds</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body">
<div class="form-row">
<div class="form-group"><label>VP Current</label><input type="number" id="vp-current" value="10"></div>
<div class="form-group"><label>VP Max</label><input type="number" id="vp-max" value="10"></div>
</div>
<div class="hp-bar"><div class="hp-bar-fill vp" id="vpBar" style="width:100%"></div></div>
<div class="form-row">
<div class="form-group"><label>WP Current</label><input type="number" id="wp-current" value="10"></div>
<div class="form-group"><label>WP Max</label><input type="number" id="wp-max" value="10"></div>
</div>
<div class="hp-bar"><div class="hp-bar-fill wp" id="wpBar" style="width:100%"></div></div>
</div>
</div>

<div class="card" id="card-defense">
<div class="card-header" data-toggle="card-defense"><h3><i class="fas fa-shield-alt"></i> Defense &amp; Saves</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body">
<div class="form-row">
<div class="form-group"><label>Defense Total</label><input type="number" id="def-total" class="computed-field" readonly=""></div>
<div class="form-group"><label>Class Def</label><input type="number" id="def-class" value="0"></div>
<div class="form-group"><label>Misc Def</label><input type="number" id="def-misc" value="0"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Fort Total</label><input type="text" id="save-fort-total" class="computed-field" readonly=""></div>
<div class="form-group"><label>Fort Base</label><input type="number" id="save-fort-base" value="0" class="gold-field" readonly=""></div>
<div class="form-group"><label>Fort Misc</label><input type="number" id="save-fort-misc" value="0"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Ref Total</label><input type="text" id="save-ref-total" class="computed-field" readonly=""></div>
<div class="form-group"><label>Ref Base</label><input type="number" id="save-ref-base" value="0" class="gold-field" readonly=""></div>
<div class="form-group"><label>Ref Misc</label><input type="number" id="save-ref-misc" value="0"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Will Total</label><input type="text" id="save-will-total" class="computed-field" readonly=""></div>
<div class="form-group"><label>Will Base</label><input type="number" id="save-will-base" value="0" class="gold-field" readonly=""></div>
<div class="form-group"><label>Will Misc</label><input type="number" id="save-will-misc" value="0"></div>
</div>
</div>
</div>

<div class="card" id="card-attack">
<div class="card-header" data-toggle="card-attack"><h3><i class="fas fa-crosshairs"></i> Attack &amp; Initiative</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body">
<div class="form-row">
<div class="form-group"><label>BAB</label><input type="number" id="bab" value="0" class="gold-field" readonly=""></div>
<div class="form-group"><label>Melee</label><input type="text" id="melee-atk" class="computed-field" readonly=""></div>
<div class="form-group"><label>Ranged</label><input type="text" id="ranged-atk" class="computed-field" readonly=""></div>
</div>
<div class="form-row">
<div class="form-group"><label>Init Total</label><input type="text" id="init-total" class="computed-field" readonly=""></div>
<div class="form-group"><label>Init Misc</label><input type="number" id="init-misc" value="0"></div>
</div>
</div>
</div>

<div class="card" id="card-force">
<div class="card-header" data-toggle="card-force"><h3><i class="fas fa-star"></i> Force &amp; Dark Side</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body">
<div class="form-row">
<div class="form-group"><label>Force Points</label><div id="forcePoints" style="display:flex;flex-wrap:wrap;gap:2px"></div></div>
<div class="form-group"><label>Max FP</label><input type="number" id="fp-max" min="0" max="20" value="5"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Dark Side Points</label><div id="darkSidePoints" style="display:flex;flex-wrap:wrap;gap:2px"></div></div>
<div class="form-group"><label>Max DSP</label><input type="number" id="dsp-max" min="0" max="20" value="5"></div>
</div>
</div>
</div>

<div class="card" id="card-skills">
<div class="card-header collapsed" data-toggle="card-skills"><h3><i class="fas fa-list"></i> Skills</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body collapsed" id="skillsBody"></div>
</div>

<div class="card" id="card-forceskills">
<div class="card-header collapsed" data-toggle="card-forceskills"><h3><i class="fas fa-bolt"></i> Force Skills</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body collapsed" id="forceSkillsBody"></div>
</div>

<div class="card" id="card-charfeats">
<div class="card-header collapsed" data-toggle="card-charfeats"><h3><i class="fas fa-medal"></i> Feats / Special Abilities</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body collapsed" id="charFeatsBody">
<input type="text" class="search-input" id="charFeatsSearch" placeholder="Search feats...">
<div id="charFeatsListContainer"></div>
</div>
</div>

<div class="card" id="card-weapons">
<div class="card-header" data-toggle="card-weapons"><h3><i class="fas fa-gun"></i> Weapons</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body">
<div id="weaponsContainer"></div>
<button class="btn btn-primary btn-small" data-action="add-weapon"><i class="fas fa-plus"></i> Add Weapon</button>
</div>
</div>

<div class="card" id="card-equipment">
<div class="card-header" data-toggle="card-equipment"><h3><i class="fas fa-box"></i> Equipment</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body">
<div id="equipContainer"></div>
<div class="form-row" style="margin-top:8px">
<div class="form-group"><label>Total Weight</label><input type="text" id="total-weight" class="computed-field" readonly="" value="0 kg"></div>
<button class="btn btn-primary btn-small" data-action="add-equip"><i class="fas fa-plus"></i> Add</button>
</div>
</div>
</div>

</div>

<!-- COMBAT TAB -->
<div class="tab-panel" id="tab-combat">
<div class="card">
<div class="card-body">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
<h3 class="mono" style="color:var(--accent)">COMBAT TRACKER</h3>
<span id="roundCounter" style="color:var(--text-dim);font-size:13px">Round 1</span>
</div>
<div style="display:flex;gap:8px;margin-bottom:12px">
<button class="btn btn-secondary" data-action="prev-turn"><i class="fas fa-arrow-left"></i></button>
<button class="btn btn-primary" style="flex:1" data-action="next-turn"><i class="fas fa-arrow-right"></i> Next Turn</button>
<button class="btn btn-secondary" data-action="reset-combat"><i class="fas fa-redo"></i></button>
</div>
<div id="combatList"></div>
<div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px">
<div class="form-row">
<div class="form-group" style="flex:2"><input type="text" id="comb-name" placeholder="Name"></div>
<div class="form-group"><input type="number" id="comb-init" placeholder="Init" value="0"></div>
<div class="form-group"><input type="number" id="comb-hp" placeholder="HP" value="20"></div>
</div>
<button class="btn btn-primary btn-block" data-action="add-combatant"><i class="fas fa-plus"></i> Add</button>
</div>
<div id="conditionTags" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:12px"></div>
</div>
</div>
</div>

<!-- DICE TAB -->
<div class="tab-panel" id="tab-dice">
<div class="dice-area">
<button class="d20-btn" data-action="roll-die" data-sides="20">d20</button>
<div class="dice-result" id="diceResult">-</div>
<div class="dice-detail" id="diceDetail"></div>
<div class="dice-grid">
<button class="btn btn-secondary" data-action="roll-die" data-sides="4">d4</button>
<button class="btn btn-secondary" data-action="roll-die" data-sides="6">d6</button>
<button class="btn btn-secondary" data-action="roll-die" data-sides="8">d8</button>
<button class="btn btn-secondary" data-action="roll-die" data-sides="10">d10</button>
<button class="btn btn-secondary" data-action="roll-die" data-sides="12">d12</button>
<button class="btn btn-secondary" data-action="roll-die" data-sides="100">d100</button>
</div>
<div class="form-row" style="max-width:400px;margin:0 auto">
<div class="form-group" style="flex:2"><input type="text" id="diceExpr" placeholder="2d6+3, 4d6dl1"></div>
<button class="btn btn-primary" data-action="roll-expr"><i class="fas fa-dice"></i></button>
</div>
<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">
<div class="form-row" style="max-width:400px;margin:0 auto">
<div class="form-group"><label>Mod</label><input type="number" id="atkMod" value="0"></div>
<div class="form-group"><label>vs AC</label><input type="number" id="atkAC" value="10"></div>
<button class="btn btn-primary" data-action="roll-attack" style="align-self:flex-end"><i class="fas fa-crosshairs"></i></button>
</div>
<div id="atkResult" style="font-size:14px;margin-top:8px"></div>
</div>
</div>
<div class="card" style="margin-top:16px">
<div class="card-header" style="padding:10px 16px"><h3 style="font-size:12px">Roll History</h3><button class="btn btn-small btn-secondary" data-action="clear-history" style="padding:4px 10px;min-height:auto;font-size:11px">Clear</button></div>
<div class="card-body roll-log" id="rollHistory"></div>
</div>
</div>

<!-- RULES TAB -->
<div class="tab-panel" id="tab-rules">
<div id="rulesContainer"></div>
<div class="card" style="margin-top:12px">
<div class="card-header" data-toggle="card-feats"><h3><i class="fas fa-medal"></i> Feats Reference</h3><i class="fas fa-chevron-down chevron"></i></div>
<div class="card-body collapsed" id="card-feats-body">
<input type="text" class="search-input" id="featsSearch" placeholder="Search feats...">
<div id="featsListContainer"></div>
</div>
</div>
</div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
<button class="nav-btn active" data-tab="character" id="nav-character"><i class="fas fa-user"></i><span>Character</span></button>
<button class="nav-btn" data-tab="combat" id="nav-combat"><i class="fas fa-crosshairs"></i><span>Combat</span></button>
<button class="nav-btn" data-tab="dice" id="nav-dice"><i class="fas fa-dice-d20"></i><span>Dice</span></button>
<button class="nav-btn" data-tab="rules" id="nav-rules"><i class="fas fa-book"></i><span>Rules</span></button>
</nav>

<script>

"use strict";

  {

    darkSide: false
  },

// ===== CORE STATE =====
var ABILITIES = ['STR','DEX','CON','INT','WIS','CHA'];
var CONDITIONS = ['Stunned','Prone','Flat-Footed','Grappled','Helpless','Blinded','Dazed','Frightened','Nauseated','Staggered','Unconscious'];
var fpCurrent = 0, dspCurrent = 0;
var weapons = [{name:'',damage:'',crit:'',range:'',notes:''}];
var equipment = [{name:'',weight:0,qty:1}];
var combatants = [], currentTurn = 0, combatRound = 1;
var charFeats = {};
var rollLog = [];
var selectedSpecies = null, selectedClass = null;
var racialMods = {};

// ===== HELPERS =====
function $(id){ return document.getElementById(id); }
function getMod(score){ return Math.floor(((parseInt(score)||10) - 10) / 2); }
function modStr(n){ return n >= 0 ? '+' + n : '' + n; }
function gv(id){ var el = $(id); return el ? (parseInt(el.value) || 0) : 0; }
function sv(id, val){ var el = $(id); if (el) el.value = val; }

// ===== TAB SWITCHING =====
function switchTab(tab) {
  var panels = document.querySelectorAll('.tab-panel');
  var btns = document.querySelectorAll('.nav-btn');
  var i;
  for (i = 0; i < panels.length; i++) panels[i].classList.remove('active');
  for (i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  var panel = $('tab-' + tab);
  var btn = $('nav-' + tab);
  if (panel) panel.classList.add('active');
  if (btn) btn.classList.add('active');
  var area = $('tabContentArea');
  if (area) area.scrollTop = 0;
}

// ===== CARD TOGGLE =====
function toggleCard(cardId) {
  var card = $(cardId);
  if (!card) return;
  var header = card.querySelector('.card-header');
  var body = card.querySelector('.card-body');
  if (header) header.classList.toggle('collapsed');
  if (body) body.classList.toggle('collapsed');
}

// ===== POPULATE DROPDOWNS =====
function buildDropdowns() {
  var speciesEl = $('char-species');
  var classEl = $('char-class');
  if (speciesEl) {
    for (var i = 0; i < SPECIES_DATA.length; i++) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = SPECIES_DATA[i].name;
      speciesEl.appendChild(opt);
    }
  }
  if (classEl) {
    for (var i = 0; i < CLASSES_DATA.length; i++) {
      var opt = document.createElement('option');
      opt.value = i;
      opt.textContent = CLASSES_DATA[i].name;
      classEl.appendChild(opt);
    }
  }
}

// ===== SPECIES AUTO-POPULATION =====
function applySpecies() {
  var idx = $('char-species') ? parseInt($('char-species').value) : -1;
  if (isNaN(idx) || idx < 0) {
    selectedSpecies = null;
    racialMods = {};
    $('char-size').value = 0;
    $('char-speed').value = '10m';
    $('speciesTraitsPanel').innerHTML = '';
    recalcAll();
    return;
  }
  selectedSpecies = SPECIES_DATA[idx];
  racialMods = selectedSpecies.abilityMods || {};
  // Size
  var sizeMod = 0;
  if (selectedSpecies.size === 'Small') sizeMod = 1;
  else if (selectedSpecies.size === 'Large') sizeMod = -1;
  $('char-size').value = sizeMod;
  $('char-speed').value = selectedSpecies.speed + 'm';
  // Traits panel
  var html = '<div class="traits-panel"><h4>' + selectedSpecies.name + ' Traits</h4>';
  var traits = selectedSpecies.traits || [];
  for (var i = 0; i < traits.length; i++) {
    html += '<div class="trait-name">' + traits[i].name + '</div>';
    html += '<div class="trait-desc">' + traits[i].description + '</div>';
  }
  html += '</div>';
  $('speciesTraitsPanel').innerHTML = html;
  recalcAll();
}

// ===== CLASS AUTO-POPULATION =====
function applyClass() {
  var idx = $('char-class') ? parseInt($('char-class').value) : -1;
  var level = gv('char-level') || 1;
  if (isNaN(idx) || idx < 0) {
    selectedClass = null;
    sv('bab', 0);
    sv('save-fort-base', 0);
    sv('save-ref-base', 0);
    sv('save-will-base', 0);
    $('classAbilitiesPanel').innerHTML = '';
    recalcAll();
    return;
  }
  selectedClass = CLASSES_DATA[idx];
  // Find progression for level
  var prog = null;
  var progression = selectedClass.progression || [];
  for (var i = 0; i < progression.length; i++) {
    if (progression[i].level === level) { prog = progression[i]; break; }
  }
  if (!prog && progression.length > 0) prog = progression[Math.min(level-1, progression.length-1)];
  if (prog) {
    // Parse BAB (may be "+6/+1" format - take first number)
    var babStr = prog.bab || '+0';
    var babNum = parseInt(babStr.replace('+','')) || 0;
    sv('bab', babNum);
    sv('save-fort-base', parseInt(prog.fort) || 0);
    sv('save-ref-base', parseInt(prog.ref) || 0);
    sv('save-will-base', parseInt(prog.will) || 0);
  }
  // Class abilities panel
  var abilities = selectedClass.abilities || [];
  var html = '<div class="class-abilities-panel"><h4>' + selectedClass.name + ' Lv.' + level + '</h4>';
  html += '<div style="font-size:11px;color:var(--text-dim);margin-bottom:6px">Hit Die: ' + selectedClass.hitDie + ' | Skills: ' + selectedClass.skillPoints + '</div>';
  if (prog && prog.special) {
    html += '<div style="font-size:12px;color:var(--accent);margin-bottom:6px">Level ' + level + ': ' + prog.special + '</div>';
  }
  // List all abilities gained up to this level
  var gained = [];
  for (var i = 0; i < abilities.length; i++) {
    if (abilities[i].level <= level) gained.push(abilities[i]);
  }
  if (gained.length > 0) {
    html += '<div style="font-size:11px;color:var(--text-dim);margin-top:6px">Abilities gained:</div>';
    for (var i = 0; i < gained.length; i++) {
      html += '<div style="font-size:12px;margin:2px 0"><span style="color:var(--info)">' + gained[i].name + '</span> (Lv.' + gained[i].level + ')</div>';
    }
  }
  html += '</div>';
  $('classAbilitiesPanel').innerHTML = html;
  // Highlight class skills
  highlightClassSkills();
  recalcAll();
}

function highlightClassSkills() {
  var rows = document.querySelectorAll('.skill-row');
  for (var i = 0; i < rows.length; i++) {
    rows[i].classList.remove('skill-class-highlight');
  }
  if (!selectedClass) return;
  var classSkills = selectedClass.classSkills || [];
  var skillEls = document.querySelectorAll('.skill-row');
  for (var i = 0; i < skillEls.length; i++) {
    var nameEl = skillEls[i].querySelector('.skill-name');
    if (!nameEl) continue;
    var sName = nameEl.textContent.trim();
    for (var j = 0; j < classSkills.length; j++) {
      if (sName.indexOf(classSkills[j]) !== -1 || classSkills[j].indexOf(sName) !== -1) {
        skillEls[i].classList.add('skill-class-highlight');
        break;
      }
    }
  }
}

// ===== CALCULATIONS =====
function recalcAll() {
  var mods = {};
  var i;
  for (i = 0; i < ABILITIES.length; i++) {
    var ab = ABILITIES[i];
    var baseEl = $('ab-' + ab);
    var baseScore = baseEl ? (parseInt(baseEl.value) || 10) : 10;
    var racial = racialMods[ab] || 0;
    var finalScore = baseScore + racial;
    var mod = getMod(finalScore);
    mods[ab] = mod;
    var modEl = $('mod-' + ab);
    if (modEl) modEl.textContent = modStr(mod);
    var racialEl = $('racial-' + ab);
    if (racialEl) racialEl.textContent = racial !== 0 ? (racial > 0 ? '+' + racial : '' + racial) : '';
    var finalEl = $('final-' + ab);
    if (finalEl) finalEl.textContent = finalScore;
  }

  var dexMod = mods.DEX || 0;
  var strMod = mods.STR || 0;
  var conMod = mods.CON || 0;
  var wisMod = mods.WIS || 0;
  var sizeMod = gv('char-size');

  // Defense
  sv('def-total', 10 + gv('def-class') + dexMod + sizeMod + gv('def-misc'));
  // Saves
  sv('save-fort-total', modStr(gv('save-fort-base') + conMod + gv('save-fort-misc')));
  sv('save-ref-total', modStr(gv('save-ref-base') + dexMod + gv('save-ref-misc')));
  sv('save-will-total', modStr(gv('save-will-base') + wisMod + gv('save-will-misc')));
  // Attack
  var bab = gv('bab');
  sv('melee-atk', modStr(bab + strMod + sizeMod));
  sv('ranged-atk', modStr(bab + dexMod + sizeMod));
  sv('init-total', modStr(dexMod + gv('init-misc')));

  // Skills
  var abilMap = {STR:strMod,DEX:dexMod,CON:conMod,INT:mods.INT||0,WIS:wisMod,CHA:mods.CHA||0,None:0};
  for (i = 0; i < SKILLS_DATA.length; i++) {
    var rEl = $('sk-' + i + '-r');
    var mEl = $('sk-' + i + '-m');
    var tEl = $('sk-' + i + '-t');
    if (rEl && mEl && tEl) {
      var ranks = parseInt(rEl.value) || 0;
      var misc = parseInt(mEl.value) || 0;
      var abMod = abilMap[SKILLS_DATA[i].ability] || 0;
      tEl.textContent = ranks + misc + abMod;
    }
  }
  // Force Skills
  for (i = 0; i < FORCE_DATA.length; i++) {
    var rEl = $('fs-' + i + '-r');
    var mEl = $('fs-' + i + '-m');
    var tEl = $('fs-' + i + '-t');
    if (rEl && mEl && tEl) {
      var ranks = parseInt(rEl.value) || 0;
      var misc = parseInt(mEl.value) || 0;
      var abMod = abilMap[FORCE_DATA[i].ability] || 0;
      tEl.textContent = ranks + misc + abMod;
    }
  }
  // Health bars
  updateHealth();
  // Equipment weight
  var totalWt = 0;
  for (i = 0; i < equipment.length; i++) totalWt += (equipment[i].weight || 0) * (equipment[i].qty || 1);
  sv('total-weight', totalWt.toFixed(1) + ' kg');
}

// ===== DICE =====
function rollDie(sides) {
  var result = Math.floor(Math.random() * sides) + 1;
  $('diceResult').textContent = result;
  $('diceDetail').textContent = 'd' + sides;
  addToLog('d' + sides + ': ' + result);
}

function rollExpression() {
  var expr = $('diceExpr') ? $('diceExpr').value.trim() : '';
  if (!expr) return;
  // Parse NdX+M or NdXdlY
  var match = expr.match(/^(\d+)d(\d+)(.*)$/i);
  if (!match) { $('diceResult').textContent = '?'; return; }
  var n = parseInt(match[1]), sides = parseInt(match[2]), rest = match[3] || '';
  var rolls = [];
  for (var i = 0; i < n; i++) rolls.push(Math.floor(Math.random() * sides) + 1);
  var total = 0;
  var dropped = [];
  if (rest.match(/dl(\d*)/i)) {
    var dropCount = parseInt(rest.match(/dl(\d*)/i)[1]) || 1;
    var sorted = rolls.slice().sort(function(a,b){return a-b});
    dropped = sorted.slice(0, dropCount);
    var kept = sorted.slice(dropCount);
    for (var i = 0; i < kept.length; i++) total += kept[i];
  } else {
    for (var i = 0; i < rolls.length; i++) total += rolls[i];
    var modMatch = rest.match(/([+-]\d+)/);
    if (modMatch) total += parseInt(modMatch[1]);
  }
  $('diceResult').textContent = total;
  $('diceDetail').textContent = '[' + rolls.join(', ') + ']' + (dropped.length ? ' drop ' + dropped.join(',') : '') + (rest && !rest.match(/dl/i) ? ' ' + rest : '');
  addToLog(expr + ': ' + total + ' [' + rolls.join(',') + ']');
}

function rollAttack() {
  var mod = gv('atkMod');
  var ac = gv('atkAC') || 10;
  var roll = Math.floor(Math.random() * 20) + 1;
  var total = roll + mod;
  var msg = '';
  if (roll === 20) msg = '<span style="color:var(--accent);font-weight:700">NAT 20! Critical Threat!</span> (' + total + ' vs AC ' + ac + ')';
  else if (roll === 1) msg = '<span style="color:var(--danger);font-weight:700">NAT 1! Automatic Miss!</span>';
  else if (total >= ac) msg = '<span style="color:var(--success)">HIT!</span> ' + total + ' vs AC ' + ac + ' (rolled ' + roll + '+' + mod + ')';
  else msg = '<span style="color:var(--danger)">MISS.</span> ' + total + ' vs AC ' + ac + ' (rolled ' + roll + '+' + mod + ')';
  $('atkResult').innerHTML = msg;
  addToLog('Attack: d20+' + mod + ' = ' + total + (total >= ac ? ' HIT' : ' MISS'));
}

function addToLog(entry) {
  rollLog.unshift(entry);
  if (rollLog.length > 20) rollLog.pop();
  renderHistory();
}

function renderHistory() {
  var el = $('rollHistory');
  if (!el) return;
  var html = '';
  for (var i = 0; i < rollLog.length; i++) {
    html += '<div class="roll-entry">' + rollLog[i] + '</div>';
  }
  el.innerHTML = html || '<div style="color:var(--text-dim);font-size:13px">No rolls yet</div>';
}

  // Populate classes in rules
  var clsHtml = '<table class="rules-table"><tr><th>Class</th><th>HD</th><th>BAB</th><th>Good Saves</th><th>Skills/Lvl</th></tr>';
  for (var i = 0; i < CLASSES_DATA.length; i++) {
    var cl = CLASSES_DATA[i];
    var goodSaves = [];
    if (cl.fortSave === 'Good') goodSaves.push('Fort');
    if (cl.refSave === 'Good') goodSaves.push('Ref');
    if (cl.willSave === 'Good') goodSaves.push('Will');
    clsHtml += '<tr><td style="color:var(--accent)">' + cl.name + '</td><td>' + cl.hitDie + '</td><td>' + cl.bab + '</td><td>' + goodSaves.join(', ') + '</td><td>' + cl.skillPoints + '</td></tr>';
  }
  clsHtml += '</table>';
  var clsEl = $('rulesClassesContent');
  if (clsEl) clsEl.innerHTML = clsHtml;
}

// ===== EVENT DELEGATION =====
document.body.addEventListener('click', function(e) {
  var actionEl = e.target.closest('[data-action]');
  var toggleEl = e.target.closest('[data-toggle]');
  var tabEl = e.target.closest('[data-tab]');

  // Tab switching
  if (tabEl) { switchTab(tabEl.getAttribute('data-tab')); return; }

  // Card toggle
  if (toggleEl) { toggleCard(toggleEl.getAttribute('data-toggle')); return; }

  if (!actionEl) return;
  var action = actionEl.getAttribute('data-action');
  var idx = parseInt(actionEl.getAttribute('data-idx'));

  // Skills
  if (action === 'show-skill') { showSkillDesc(idx); return; }
  if (action === 'show-fskill') { showForceSkillDesc(idx); return; }
  if (action === 'show-feat') { showFeatDesc(idx); return; }
    if (action === 'show-char-feat') { showCharFeatDesc(idx); return; }
    if (action === 'toggle-char-feat') { charFeats[idx] = !charFeats[idx]; return; }

  // Force Points
  if (action === 'fp-pip') { fpCurrent = (idx < fpCurrent) ? idx : idx + 1; renderForcePoints(); return; }
  if (action === 'dsp-pip') { dspCurrent = (idx < dspCurrent) ? idx : idx + 1; renderDarkSidePoints(); return; }

  // Weapons
  if (action === 'add-weapon') { weapons.push({name:'',damage:'',crit:'',range:'',notes:''}); renderWeapons(); return; }
  if (action === 'remove-wpn') { weapons.splice(idx, 1); if (weapons.length === 0) weapons.push({name:'',damage:'',crit:'',range:'',notes:''}); renderWeapons(); return; }

  // Equipment
  if (action === 'add-equip') { equipment.push({name:'',weight:0,qty:1}); renderEquipment(); return; }
  if (action === 'remove-eqp') { equipment.splice(idx, 1); if (equipment.length === 0) equipment.push({name:'',weight:0,qty:1}); renderEquipment(); recalcAll(); return; }

  // Combat
  if (action === 'add-combatant') {
    var nameEl = $('comb-name');
    var name = nameEl ? nameEl.value.trim() : '';
    if (!name) return;
    combatants.push({name: name, init: gv('comb-init'), hp: gv('comb-hp'), maxHp: gv('comb-hp'), conditions: []});
    combatants.sort(function(a,b){return b.init - a.init});
    if (nameEl) nameEl.value = '';
    renderCombat(); return;
  }
  if (action === 'next-turn') {
    if (combatants.length === 0) return;
    currentTurn++;
    if (currentTurn >= combatants.length) { currentTurn = 0; combatRound++; }
    renderCombat(); return;
  }
  if (action === 'prev-turn') {
    if (combatants.length === 0) return;
    currentTurn--;
    if (currentTurn < 0) { currentTurn = combatants.length - 1; if (combatRound > 1) combatRound--; }
    renderCombat(); return;
  }
  if (action === 'reset-combat') { combatants = []; currentTurn = 0; combatRound = 1; renderCombat(); return; }
  if (action === 'damage-comb') { if (combatants[idx]) { combatants[idx].hp -= 1; renderCombat(); } return; }
  if (action === 'heal-comb') { if (combatants[idx]) { combatants[idx].hp = Math.min(combatants[idx].maxHp, combatants[idx].hp + 1); renderCombat(); } return; }
  if (action === 'remove-comb') { combatants.splice(idx, 1); if (currentTurn >= combatants.length) currentTurn = 0; renderCombat(); return; }
  if (action === 'toggle-condition') {
    var cond = actionEl.getAttribute('data-cond');
    actionEl.classList.toggle('active');
    if (combatants.length > 0 && currentTurn < combatants.length) {
      var c = combatants[currentTurn];
      var ci = c.conditions.indexOf(cond);
      if (ci === -1) c.conditions.push(cond);
      else c.conditions.splice(ci, 1);
      renderCombat();
    }
    return;
  }

  // Dice
  if (action === 'roll-die') { rollDie(parseInt(actionEl.getAttribute('data-sides'))); return; }
  if (action === 'roll-expr') { rollExpression(); return; }
  if (action === 'roll-attack') { rollAttack(); return; }
  if (action === 'clear-history') { rollLog = []; renderHistory(); return; }

  // Accordion
  if (action === 'toggle-accordion') {
    actionEl.classList.toggle('open');
    var body = actionEl.nextElementSibling;
    if (body) body.classList.toggle('open');
    return;
  }
});

// ===== INPUT DELEGATION =====
document.addEventListener('input', function(e) {
  var target = e.target;

  // Feats search
  if (target.id === 'featsSearch') { renderFeats(target.value); return; }
    if (target.id === 'charFeatsSearch') { renderCharFeats(target.value); return; }

  // Species change
  if (target.id === 'char-species') { applySpecies(); return; }
  // Class change
  if (target.id === 'char-class' || target.id === 'char-level') { applyClass(); return; }
  // FP/DSP max
  if (target.id === 'fp-max') { renderForcePoints(); return; }
  if (target.id === 'dsp-max') { renderDarkSidePoints(); return; }

  // Weapon field update
  var wpnIdx = target.getAttribute('data-wpn');
  if (wpnIdx !== null) {
    var field = target.getAttribute('data-field');
    var wi = parseInt(wpnIdx);
    if (weapons[wi] && field) weapons[wi][field] = target.value;
    return;
  }

  // Equipment field update
  var eqpIdx = target.getAttribute('data-eqp');
  if (eqpIdx !== null) {
    var ef = target.getAttribute('data-field');
    var ei = parseInt(eqpIdx);
    if (equipment[ei] && ef) {
      if (ef === 'weight') equipment[ei].weight = parseFloat(target.value) || 0;
      else if (ef === 'qty') equipment[ei].qty = parseInt(target.value) || 1;
      else equipment[ei][ef] = target.value;
    }
    recalcAll();
    return;
  }

  recalcAll();
});

// Also listen for 'change' on selects
document.addEventListener('change', function(e) {
  if (e.target.id === 'char-species') { applySpecies(); return; }
  if (e.target.id === 'char-class') { applyClass(); return; }
});

// ===== SWIPE =====
var touchStartX = 0;
var tabOrder = ['character','combat','dice','rules'];
document.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; }, {passive: true});
document.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) < 80) return;
  var activePanel = document.querySelector('.tab-panel.active');
  if (!activePanel) return;
  var currentIdx = tabOrder.indexOf(activePanel.id.replace('tab-',''));
  if (dx < 0 && currentIdx < tabOrder.length - 1) switchTab(tabOrder[currentIdx + 1]);
  else if (dx > 0 && currentIdx > 0) switchTab(tabOrder[currentIdx - 1]);
}, {passive: true});

// ===== INIT =====
function init() {
  buildDropdowns();
  buildAbilities();
  buildSkills();
  buildForceSkills();
  buildConditions();
  buildRules();
  buildFeatsReference();
  buildCharFeats();
  renderForcePoints();
  renderDarkSidePoints();
  renderWeapons();
  renderEquipment();
  renderCombat();
  renderHistory();
  recalcAll();
}

init();

// === PWA Service Worker (only when opened directly, not in iframe) ===
if (window.self === window.top) {
  try {
    if ('serviceWorker' in navigator) {
      var swCode = 'self.addEventListener("install",function(e){self.skipWaiting()});';
      swCode += 'self.addEventListener("activate",function(e){e.waitUntil(clients.claim())});';
      swCode += 'self.addEventListener("fetch",function(e){e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request)}))});';
      var swBlob = new Blob([swCode], {type: "application/javascript"});
      var swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl);
    }
  } catch(e) {}
}

})();
</script>
